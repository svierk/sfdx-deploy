name: SFDX Deploy
description: GitHub composite action for deploying Salesforce metadata to a target org.

branding:
  icon: upload
  color: blue

inputs:
  source-dir:
    description: Comma-separated list of source directories to deploy, e.g. "force-app,my-other-app".
    required: false
  manifest:
    description: Path to a manifest (package.xml) file that specifies the components to deploy.
    required: false
  metadata:
    description: Comma-separated list of metadata component names to deploy, e.g. "ApexClass,CustomObject:Account".
    required: false
  destructive-changes:
    description: >
      Automatically detect metadata deleted in the repository (via sfdx-git-delta) and apply those
      deletions to the target org AFTER the deployment (post-destructive changes). Works for normal
      full deployments as well as delta mode. The deletions are derived from the git range defined by
      "delta-from" and "delta-to", so full git history is required (fetch-depth: 0). Set to false to
      deploy additively only.
    required: false
    default: 'true'
  delta:
    description: >
      Deploy only the components that changed between two git refs, using the sfdx-git-delta plugin.
      When enabled, the generated delta manifest takes precedence over the source-dir, manifest and metadata inputs.
      Requires the repository to be checked out with full git history (fetch-depth: 0).
    required: false
    default: 'false'
  delta-from:
    description: >
      Git ref to compare from when detecting changes/deletions, e.g. a base branch or commit SHA like "origin/main".
      Required in delta mode. For destructive changes on full deployments it defaults to the previous commit ("HEAD~1").
    required: false
  delta-to:
    description: Git ref to compare to when detecting changes/deletions.
    required: false
    default: HEAD
  target-org:
    description: Username or alias of the target org. Not required if the default org is already set.
    required: false
  test-level:
    description: >
      Deployment Apex test level. Permissible values are:
      NoTestRun, RunSpecifiedTests, RunLocalTests, RunAllTestsInOrg.
      Ignored when the "tests" input is provided (the CLI then runs the specified tests).
    required: false
  tests:
    description: Comma-separated list of Apex tests to run, used with the RunSpecifiedTests test level.
    required: false
  dry-run:
    description: Validate the deployment without saving the components to the org (check-only deployment).
    required: false
    default: 'false'
  ignore-conflicts:
    description: Ignore conflicts and deploy local files, even if they overwrite changes in the org.
    required: false
    default: 'false'
  ignore-warnings:
    description: Ignore warnings and allow the deployment to complete successfully.
    required: false
    default: 'false'
  wait:
    description: Number of minutes to wait for the deployment to complete.
    required: false
    default: '33'
  api-version:
    description: Override the api version used for api requests made by this action, for example '59.0'.
    required: false
  step-summary:
    description: Write a result section to the GitHub Actions job summary. Set to false to avoid collisions with a custom workflow summary.
    required: false
    default: 'true'

outputs:
  deploy-id:
    description: ID of the deployment job.
    value: ${{ steps.deploy.outputs.deploy-id }}
  status:
    description: Final status of the deployment, e.g. "Succeeded" or "Failed".
    value: ${{ steps.deploy.outputs.status }}

runs:
  using: composite
  steps:
    - name: Deploy Metadata
      id: deploy
      shell: bash
      env:
        SOURCE_DIR: ${{ inputs.source-dir }}
        MANIFEST: ${{ inputs.manifest }}
        METADATA: ${{ inputs.metadata }}
        DESTRUCTIVE_CHANGES: ${{ inputs.destructive-changes }}
        DELTA: ${{ inputs.delta }}
        DELTA_FROM: ${{ inputs.delta-from }}
        DELTA_TO: ${{ inputs.delta-to }}
        TARGET_ORG: ${{ inputs.target-org }}
        TEST_LEVEL: ${{ inputs.test-level }}
        TESTS: ${{ inputs.tests }}
        DRY_RUN: ${{ inputs.dry-run }}
        IGNORE_CONFLICTS: ${{ inputs.ignore-conflicts }}
        IGNORE_WARNINGS: ${{ inputs.ignore-warnings }}
        WAIT: ${{ inputs.wait }}
        API_VERSION: ${{ inputs.api-version }}
        STEP_SUMMARY: ${{ inputs.step-summary }}
      run: |
        set -euo pipefail

        args=()

        # Label the run as a validation (dry-run / check-only) or a real deploy
        # so the log and job summary reflect what actually happened.
        if [[ "$DRY_RUN" == "true" ]]; then
          noun="Validation"
          icon="🔍"
        else
          noun="Deployment"
          icon="🚀"
        fi

        # Append a flag once per comma-separated value (trimmed).
        add_multi() {
          local flag="$1" values="$2" item
          IFS=',' read -ra items <<< "$values"
          for item in "${items[@]}"; do
            item="$(echo "$item" | xargs)"
            [[ -n "$item" ]] && args+=("$flag" "$item")
          done
        }

        # Make sure the sfdx-git-delta plugin is available (used to derive both
        # delta manifests and automatic destructive changes from the git diff).
        # If a previous step already installed it, the check skips reinstalling.
        # Installation output (unsigned-plugin prompt, npm warnings, ...) is
        # captured and only surfaced on failure to keep the log clean.
        ensure_sgd() {
          if sf plugins | grep -q 'sfdx-git-delta'; then
            return 0
          fi
          echo "Installing sfdx-git-delta plugin..."
          local log
          if ! log="$(echo y | sf plugins install sfdx-git-delta 2>&1)"; then
            echo "$log"
            echo "::error::Failed to install the sfdx-git-delta plugin."
            return 1
          fi
        }

        # A shallow clone is the most common reason changes (including deletions)
        # are missed: sfdx-git-delta needs the full history to diff.
        warn_if_shallow() {
          if [[ "$(git rev-parse --is-shallow-repository 2>/dev/null)" == "true" ]]; then
            echo "::warning::The repository is a shallow clone — sfdx-git-delta may miss changes, including metadata deletions. Check out with 'fetch-depth: 0'."
          fi
        }

        # Generate an sfdx-git-delta output set into changed-sources/ for a range.
        # $3 may be "--generate-delta" to also copy the changed source files.
        # The plugin's chatter (promo footer, progress) is captured and only
        # shown on failure to keep the deployment log clean.
        generate_delta() {
          rm -rf changed-sources
          mkdir -p changed-sources
          local log
          if ! log="$(sf sgd source delta --from "$1" --to "$2" --output-dir changed-sources ${3:-} 2>&1)"; then
            echo "$log"
            echo "::error::sfdx-git-delta failed to generate the delta between '$1' and '$2'."
            return 1
          fi
        }

        # True when a generated destructiveChanges.xml actually lists components.
        has_destructions() {
          [[ -f "$1" ]] && grep -q '<types>' "$1"
        }

        destructive=""

        if [[ "$DELTA" == "true" ]]; then
          echo "Delta mode enabled — generating manifest from git diff..."

          if [[ -z "$DELTA_FROM" ]]; then
            echo "::error::Delta mode requires the 'delta-from' input (a git ref to diff against)."
            exit 1
          fi

          warn_if_shallow
          ensure_sgd
          generate_delta "$DELTA_FROM" "$DELTA_TO" --generate-delta

          manifest="changed-sources/package/package.xml"
          candidate="changed-sources/destructiveChanges/destructiveChanges.xml"

          additive=false
          has_destructions "$manifest" && additive=true
          [[ "$DESTRUCTIVE_CHANGES" == "true" ]] && has_destructions "$candidate" && destructive="$candidate"

          if [[ "$additive" == "false" && -z "$destructive" ]]; then
            echo "ℹ️ No deployable changes detected in the delta — skipping."
            {
              echo "deploy-id="
              echo "status=Nothing to deploy"
            } >> "$GITHUB_OUTPUT"
            if [[ "$STEP_SUMMARY" == "true" ]]; then
              {
                echo ""
                echo "### ${icon} ${noun} skipped"
                echo ""
                echo "- **Status:** Nothing to deploy (no changes in the delta)"
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi

          args+=(--manifest "$manifest")
        else
          # For a normal full deployment, optionally derive metadata deletions
          # from the git diff and apply them after the deploy. Salesforce's
          # --post-destructive-changes must be paired with --manifest and can't
          # be combined with --source-dir/--metadata, so when deletions exist we
          # deploy via a generated manifest to keep it a single, atomic deploy.
          if [[ "$DESTRUCTIVE_CHANGES" == "true" ]]; then
            from="${DELTA_FROM:-HEAD~1}"
            to="${DELTA_TO:-HEAD}"
            warn_if_shallow
            if git rev-parse --verify --quiet "$from" >/dev/null && git rev-parse --verify --quiet "$to" >/dev/null; then
              ensure_sgd
              echo "Detecting deleted metadata between '$from' and '$to'..."
              generate_delta "$from" "$to"
              candidate="changed-sources/destructiveChanges/destructiveChanges.xml"
              has_destructions "$candidate" && destructive="$candidate"
            else
              echo "::warning::Cannot resolve git range '${from}'..'${to}' to detect deletions — deploying additively. Provide 'delta-from' and check out with fetch-depth: 0."
            fi
          fi

          if [[ -n "$destructive" ]]; then
            echo "🗑️  Metadata deletions detected — they will be applied after the deployment."
            if [[ -n "$MANIFEST" ]]; then
              args+=(--manifest "$MANIFEST")
            else
              # Build a manifest covering the configured source so it can carry
              # the post-destructive changes in one deploy.
              rm -rf generated-manifest
              mkdir -p generated-manifest
              gen=()
              if [[ -n "$SOURCE_DIR" ]]; then
                IFS=',' read -ra _sd <<< "$SOURCE_DIR"
                for d in "${_sd[@]}"; do d="$(echo "$d" | xargs)"; [[ -n "$d" ]] && gen+=(--source-dir "$d"); done
              fi
              if [[ -n "$METADATA" ]]; then
                IFS=',' read -ra _md <<< "$METADATA"
                for m in "${_md[@]}"; do m="$(echo "$m" | xargs)"; [[ -n "$m" ]] && gen+=(--metadata "$m"); done
              fi
              # Fall back to the package directories from sfdx-project.json when
              # no explicit source was given (same default the CLI would deploy).
              if [[ ${#gen[@]} -eq 0 && -f sfdx-project.json ]]; then
                while IFS= read -r p; do [[ -n "$p" ]] && gen+=(--source-dir "$p"); done < <(jq -r '.packageDirectories[]?.path // empty' sfdx-project.json)
              fi
              sf project generate manifest "${gen[@]}" --output-dir generated-manifest
              manifest_path="$(ls generated-manifest/*.xml 2>/dev/null | head -n1)"
              args+=(--manifest "$manifest_path")
            fi
          else
            [[ -n "$SOURCE_DIR" ]] && add_multi --source-dir "$SOURCE_DIR"
            [[ -n "$METADATA" ]] && add_multi --metadata "$METADATA"
            [[ -n "$MANIFEST" ]] && args+=(--manifest "$MANIFEST")
          fi
        fi

        # Deletions are always applied after the deployment (post-destructive),
        # for both delta and full deployments.
        [[ -n "$destructive" ]] && args+=(--post-destructive-changes "$destructive")

        if [[ -n "$TESTS" ]]; then
          add_multi --tests "$TESTS"
        elif [[ -n "$TEST_LEVEL" ]]; then
          args+=(--test-level "$TEST_LEVEL")
        fi

        [[ -n "$TARGET_ORG" ]] && args+=(--target-org "$TARGET_ORG")
        [[ -n "$API_VERSION" ]] && args+=(--api-version "$API_VERSION")
        [[ -n "$WAIT" ]] && args+=(--wait "$WAIT")
        [[ "$DRY_RUN" == "true" ]] && args+=(--dry-run)
        [[ "$IGNORE_CONFLICTS" == "true" ]] && args+=(--ignore-conflicts)
        [[ "$IGNORE_WARNINGS" == "true" ]] && args+=(--ignore-warnings)

        # Capture the result even on failure so the JSON and outputs are still
        # available, then propagate the CLI exit code to fail the step.
        set +e
        result=$(sf project deploy start --json "${args[@]}")
        exit_code=$?
        set -e

        deploy_id=$(echo "$result" | jq -r '.result.id // empty')
        status=$(echo "$result" | jq -r '.result.status // empty')

        {
          echo "deploy-id=$deploy_id"
          echo "status=$status"
        } >> "$GITHUB_OUTPUT"

        # Collapse the per-file entries into one row per component. The CLI
        # reports a component once per source file (an LWC as .js/.html/.js-meta.xml,
        # an Apex class as .cls/.cls-meta.xml, ...), so dedupe by type + name +
        # state to list and count each component only once. Deletions from
        # post-destructive changes are not part of .result.files, so pull them
        # from .result.details.componentSuccesses (deleted == true), where the
        # type lives under .componentType.
        components=$(echo "$result" | jq -c '
          [
            (.result.files[]? | {state: (.state // "—"), type: (.type // "—"), fullName: (.fullName // "—")}),
            (.result.details.componentSuccesses[]?
              | select((.deleted == true) or (.deleted == "true"))
              | select((.fullName // "") != "" and (.fullName // "") != "package.xml")
              | {state: "Deleted", type: (.componentType // "—"), fullName: .fullName})
          ]
          | unique')

        # Component counts by state (deletions come from destructive changes).
        created=$(echo "$components" | jq '[.[] | select(.state == "Created")] | length')
        changed=$(echo "$components" | jq '[.[] | select(.state == "Changed")] | length')
        deleted=$(echo "$components" | jq '[.[] | select(.state == "Deleted")] | length')
        failed=$(echo  "$components" | jq '[.[] | select(.state == "Failed")]  | length')

        failed_note=""
        [[ "${failed:-0}" -gt 0 ]] && failed_note=" · ❌ ${failed} failed"
        counts="🟢 ${created} created · 🟡 ${changed} changed · 🔴 ${deleted} deleted${failed_note}"

        # Emit the changed/deleted/failed components as markdown table rows,
        # skipping unchanged ones. Reads $components from the surrounding scope.
        component_rows() {
          echo "$components" | jq -r '
            map(select(.state != "Unchanged"))
            | sort_by(.state, .type, .fullName)
            | .[]
            | "| \({Created:"🟢 Created", Changed:"🟡 Changed", Deleted:"🔴 Deleted", Failed:"❌ Failed"}[.state] // .state) | \(.type) | `\(.fullName)` |"
          '
        }

        # Console: concise header + aligned component table, then the full JSON
        # folded into a collapsible group so it no longer clutters the log.
        echo ""
        if [[ "$exit_code" -eq 0 ]]; then
          echo "✅ ${noun} ${status:-completed}${deploy_id:+ (ID: $deploy_id)} — ${counts}"
        else
          echo "❌ ${noun} failed${deploy_id:+ (ID: $deploy_id)} — ${counts}"
        fi

        comp_tsv=$(echo "$components" | jq -r '
          map(select(.state != "Unchanged"))
          | sort_by(.state, .type, .fullName)
          | .[] | [.state, .type, .fullName] | @tsv')
        if [[ -n "$comp_tsv" ]]; then
          echo ""
          printf 'STATE\tTYPE\tNAME\n%s\n' "$comp_tsv" | column -t -s "$(printf '\t')"
        elif [[ "$exit_code" -eq 0 ]]; then
          echo "ℹ️ No components created, changed or deleted."
        fi

        # Details group ("Deployment details" / "Validation details"): a
        # human-readable breakdown of the CLI result (deployment info, component
        # errors, test failures, coverage warnings) folded into a collapsible
        # group instead of a raw JSON dump, so failures can be debugged without
        # wading through the full payload.
        echo "::group::${noun} details"
        echo "$result" | jq -r '
          def arr: if . == null then [] elif type == "array" then . else [.] end;
          def yn: if . == true or . == "true" then "yes" elif . == false or . == "false" then "no" else "—" end;
          def oneline: tostring | gsub("\n"; " ");
          .result as $r
          | if ($r // {}) == {} then
              ["The CLI returned no deployment result."]
              + (if (.name // "") != "" then ["Error:   \(.name)"] else [] end)
              + (if (.message // "") != "" then ["Message: \(.message)"] else [] end)
            else
              [
                "Deploy ID:          \($r.id // "—")",
                "Status:             \($r.status // "—")",
                "Check only:         \($r.checkOnly | yn)",
                "Rollback on error:  \($r.rollbackOnError | yn)",
                "Created by:         \($r.createdByName // "—")",
                "Started:            \($r.createdDate // "—")",
                "Completed:          \($r.completedDate // "—")",
                "Components:         \($r.numberComponentsDeployed // 0)/\($r.numberComponentsTotal // 0) deployed, \($r.numberComponentErrors // 0) failed",
                "Tests:              \($r.numberTestsCompleted // 0)/\($r.numberTestsTotal // 0) completed, \($r.numberTestErrors // 0) failed"
              ]
              + (if ($r.errorMessage // "") != "" then
                   ["", "Error\(if ($r.errorStatusCode // "") != "" then " (\($r.errorStatusCode))" else "" end): \($r.errorMessage | oneline)"]
                 else [] end)
              + (($r.details.componentFailures | arr) as $cf
                 | if ($cf | length) > 0 then
                     ["", "Component errors:"]
                     + [$cf[]
                        | "  ❌ \(.componentType // .type // "—") \(.fullName // "—")"
                          + (if (.lineNumber // "") != "" then " (line \(.lineNumber)\(if (.columnNumber // "") != "" then ", col \(.columnNumber)" else "" end))" else "" end)
                          + ": \((.problem // "—") | oneline)"]
                   else [] end)
              + (($r.details.runTestResult.failures | arr) as $tf
                 | if ($tf | length) > 0 then
                     ["", "Test failures:"]
                     + [$tf[]
                        | "  ❌ \(.name // "—").\(.methodName // "—"): \((.message // "—") | oneline)"
                          + (if (.stackTrace // "") != "" then "\n     \(.stackTrace | gsub("\n"; "\n     "))" else "" end)]
                   else [] end)
              + (($r.details.runTestResult.codeCoverageWarnings | arr) as $cw
                 | if ($cw | length) > 0 then
                     ["", "Code coverage warnings:"]
                     + [$cw[] | "  ⚠️ \(if (.name // "") != "" then "\(.name): " else "" end)\(.message // "—" | oneline)"]
                   else [] end)
            end
          | .[]
        '
        echo "::endgroup::"

        if [[ "$STEP_SUMMARY" == "true" ]]; then
          {
            echo ""
            echo "### ${icon} ${noun} ${status:-result}"
            echo ""
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "- **Mode:** Validation only (dry-run / check-only — nothing was saved to the org)"
            else
              echo "- **Mode:** Deployment (components saved to the org)"
            fi
            echo "- **Status:** ${status:-unknown}"
            if [[ -n "$deploy_id" ]]; then
              echo "- **Deploy ID:** \`$deploy_id\`"
            fi
            echo "- **Components:** ${counts}"
            echo ""

            rows="$(component_rows)"
            if [[ -n "$rows" ]]; then
              echo "| State | Type | Name |"
              echo "| ----- | ---- | ---- |"
              echo "$rows"
              echo ""
            elif [[ "$exit_code" -eq 0 ]]; then
              echo "_No components created, changed or deleted._"
              echo ""
            fi

            if [[ "${failed:-0}" -gt 0 ]]; then
              echo "**Failures:**"
              echo ""
              echo "| Type | Name | Problem |"
              echo "| ---- | ---- | ------- |"
              echo "$result" | jq -r '
                [.result.files[]? | select(.state == "Failed")
                 | {type: (.type // "—"), fullName: (.fullName // "—"), problem: ((.error // .problemType // "—") | gsub("\n"; " "))}]
                | unique[]
                | "| \(.type) | `\(.fullName)` | \(.problem) |"'
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        exit $exit_code
